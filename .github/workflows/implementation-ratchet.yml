name: "Nokta Implementation Ratchet"

# Triggered when implementation files (app/, src/, __tests__/) change.
# This is Path C â€” implementation PRs require HUMAN APPROVAL even if CI passes.
# Unlike spec PRs (Path A/B), this workflow does NOT auto-merge.

on:
  pull_request:
    paths:
      - "app/**/*"
      - "src/**/*"
      - "__tests__/**/*"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".eslintrc.js"
      - "babel.config.js"
      - "app.json"
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  hard-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm ci

      - name: Hard Gate 1 â€” TypeScript
        id: typescript
        run: |
          echo "Running TypeScript compiler..."
          npx tsc --noEmit > /tmp/tsc.log 2>&1 || TSC_EXIT=$?
          if [ "${TSC_EXIT:-0}" -ne 0 ]; then
            echo "status=âťŚ FAIL" >> $GITHUB_OUTPUT
            echo "output<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/tsc.log >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "status=âś… PASS" >> $GITHUB_OUTPUT
            echo "output=Zero TypeScript errors" >> $GITHUB_OUTPUT
          fi

      - name: Hard Gate 2 â€” ESLint
        id: eslint
        if: success() || failure()
        run: |
          echo "Running ESLint..."
          npx eslint . --ext .ts,.tsx > /tmp/eslint.log 2>&1 || ESLINT_EXIT=$?
          if [ "${ESLINT_EXIT:-0}" -ne 0 ]; then
            echo "status=âťŚ FAIL" >> $GITHUB_OUTPUT
            echo "output<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/eslint.log >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "status=âś… PASS" >> $GITHUB_OUTPUT
            echo "output=Zero ESLint errors" >> $GITHUB_OUTPUT
          fi

      - name: Hard Gate 3 â€” Tests
        id: tests
        if: success() || failure()
        run: |
          echo "Running Jest tests..."
          npm test -- --ci --coverage > /tmp/jest.log 2>&1 || JEST_EXIT=$?
          if [ "${JEST_EXIT:-0}" -ne 0 ]; then
            echo "status=âťŚ FAIL" >> $GITHUB_OUTPUT
            echo "output<<EOF" >> $GITHUB_OUTPUT
            cat /tmp/jest.log >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
            exit 1
          else
            PASS_COUNT=$(grep -oP '\d+ passing' /tmp/jest.log | grep -oP '\d+' || echo "0")
            echo "status=âś… PASS" >> $GITHUB_OUTPUT
            echo "output=$PASS_COUNT tests passing" >> $GITHUB_OUTPUT
            echo "pass_count=$PASS_COUNT" >> $GITHUB_OUTPUT
          fi

      - name: Hard Gate 4 â€” Bundle Size
        id: bundle
        if: success() || failure()
        run: |
          echo "Checking bundle size..."
          npx expo export --dump-sourcemap --output-dir /tmp/expo-export > /tmp/bundle.log 2>&1 || true
          if [ -f /tmp/expo-export/_expo/static/js/web/*.js ]; then
            BUNDLE_SIZE=$(du -sb /tmp/expo-export/_expo/static/js/web/*.js | awk '{s+=$1} END {print s}')
            BUNDLE_SIZE_MB=$(echo "scale=2; $BUNDLE_SIZE / 1048576" | bc)
            if (( $(echo "$BUNDLE_SIZE_MB > 2" | bc -l) )); then
              echo "status=âťŚ FAIL" >> $GITHUB_OUTPUT
              echo "output=Bundle size ${BUNDLE_SIZE_MB}MB exceeds 2MB limit" >> $GITHUB_OUTPUT
              exit 1
            else
              echo "status=âś… PASS" >> $GITHUB_OUTPUT
              echo "output=Bundle size ${BUNDLE_SIZE_MB}MB (under 2MB limit)" >> $GITHUB_OUTPUT
            fi
          else
            echo "status=âš ď¸Ź  SKIP" >> $GITHUB_OUTPUT
            echo "output=No bundle generated (not an Expo app yet)" >> $GITHUB_OUTPUT
          fi

      - name: Hard Gate 5 â€” Dependency Lock
        id: deps
        if: success() || failure()
        run: |
          echo "Checking for unauthorized dependency changes..."
          git fetch origin main
          if git diff origin/main -- package.json | grep -E '^\+.*"(dependencies|devDependencies)"' > /dev/null; then
            echo "status=âťŚ FAIL" >> $GITHUB_OUTPUT
            echo "output=Unauthorized dependency changes detected. Requires GitHub issue approval." >> $GITHUB_OUTPUT
            exit 1
          else
            echo "status=âś… PASS" >> $GITHUB_OUTPUT
            echo "output=No unauthorized dependency changes" >> $GITHUB_OUTPUT
          fi

      - name: Generate Hard Gates Report
        if: success() || failure()
        run: |
          cat > /tmp/hard_gates_report.md <<EOF
          # đź› ď¸Ź Nokta Implementation Ratchet â€” Hard Gates

          | Gate | Status | Details |
          |------|--------|---------|
          | TypeScript | ${{ steps.typescript.outputs.status }} | ${{ steps.typescript.outputs.output }} |
          | ESLint | ${{ steps.eslint.outputs.status }} | ${{ steps.eslint.outputs.output }} |
          | Tests | ${{ steps.tests.outputs.status }} | ${{ steps.tests.outputs.output }} |
          | Bundle Size | ${{ steps.bundle.outputs.status }} | ${{ steps.bundle.outputs.output }} |
          | Dep Lock | ${{ steps.deps.outputs.status }} | ${{ steps.deps.outputs.output }} |

          ---

          ## âš ď¸Ź IMPORTANT: Human Review Required

          **This is an implementation PR (Path C). Even if all hard gates pass, a maintainer MUST review and approve before merge.**

          Implementation PRs do NOT auto-merge. This is by design:
          - Security review (API keys, XSS, injection, etc.)
          - Architectural compliance (program.md Â§ 11)
          - Spec compliance (program.md or specs/*.md)
          - Testing philosophy compliance (program.md Â§ 12)

          ---

          ## Next Steps

          **If any gate failed:**
          1. Fix the issue locally
          2. Verify with: \`npx tsc --noEmit\`, \`npx eslint . --ext .ts,.tsx\`, \`npm test\`
          3. Push to the same branch
          4. CI will re-run automatically

          **If all gates passed:**
          1. Wait for maintainer review
          2. Address any review comments
          3. Maintainer will approve and merge when ready

          ---

          ## Checklist for Maintainer Review

          - [ ] Spec compliance: Implements program.md Â§ X or specs/Y.md exactly
          - [ ] Architectural invariants: Zustand for state, no direct AsyncStorage from components, service layer properly used
          - [ ] Testing philosophy: Tests validate user behavior, no snapshot spam, no mock-everything
          - [ ] Security: No API keys, no XSS/injection vulnerabilities
          - [ ] Evidence provided: Screenshots, screen recording, or APK
          - [ ] PR size: â‰¤ 10 files, â‰¤ 500 lines changed
          - [ ] No features outside spec (no "nice to have" additions)
          - [ ] No NON-GOALS implemented (program.md Â§ 3)

          EOF

      - name: Post Hard Gates Comment
        if: success() || failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/hard_gates_report.md
          header: implementation-ratchet

      - name: Gate Decision
        run: |
          if [ "${{ steps.typescript.outputs.status }}" == "âťŚ FAIL" ] || \
             [ "${{ steps.eslint.outputs.status }}" == "âťŚ FAIL" ] || \
             [ "${{ steps.tests.outputs.status }}" == "âťŚ FAIL" ] || \
             [ "${{ steps.bundle.outputs.status }}" == "âťŚ FAIL" ] || \
             [ "${{ steps.deps.outputs.status }}" == "âťŚ FAIL" ]; then
            echo "âťŚ REJECTED: One or more hard gates failed."
            exit 1
          else
            echo "âś… HARD GATES PASSED: Eligible for human review."
            echo "âš ď¸Ź  NOTE: This PR will NOT auto-merge. Maintainer approval required."
          fi

  # Golden flow tests (when they exist)
  golden-flows:
    runs-on: ubuntu-latest
    needs: hard-gates
    if: success()
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: main-branch

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies (PR branch)
        run: npm ci

      - name: Run Golden Flow Tests (PR branch)
        id: pr_tests
        continue-on-error: true
        run: |
          # Check if golden flow tests exist
          if [ -d "__tests__/golden-flows" ]; then
            npm test -- __tests__/golden-flows --json > /tmp/pr-tests.json 2>&1 || true
            PR_PASS=$(jq -r '.numPassedTests // 0' /tmp/pr-tests.json)
            PR_TOTAL=$(jq -r '.numTotalTests // 0' /tmp/pr-tests.json)
            if [ "$PR_TOTAL" -gt 0 ]; then
              PR_SCORE=$(echo "scale=2; ($PR_PASS / $PR_TOTAL) * 100" | bc)
            else
              PR_SCORE=0
            fi
            echo "pass=$PR_PASS" >> $GITHUB_OUTPUT
            echo "total=$PR_TOTAL" >> $GITHUB_OUTPUT
            echo "score=$PR_SCORE" >> $GITHUB_OUTPUT
          else
            echo "pass=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "score=0" >> $GITHUB_OUTPUT
            echo "âš ď¸Ź  No golden flow tests found yet (expected in Phase 7)"
          fi

      - name: Run Golden Flow Tests (main branch)
        id: main_tests
        continue-on-error: true
        run: |
          cd main-branch
          if [ -d "__tests__/golden-flows" ] && [ -f "package.json" ]; then
            npm ci > /dev/null 2>&1
            npm test -- __tests__/golden-flows --json > /tmp/main-tests.json 2>&1 || true
            MAIN_PASS=$(jq -r '.numPassedTests // 0' /tmp/main-tests.json)
            MAIN_TOTAL=$(jq -r '.numTotalTests // 0' /tmp/main-tests.json)
            if [ "$MAIN_TOTAL" -gt 0 ]; then
              MAIN_SCORE=$(echo "scale=2; ($MAIN_PASS / $MAIN_TOTAL) * 100" | bc)
            else
              MAIN_SCORE=0
            fi
            echo "pass=$MAIN_PASS" >> $GITHUB_OUTPUT
            echo "total=$MAIN_TOTAL" >> $GITHUB_OUTPUT
            echo "score=$MAIN_SCORE" >> $GITHUB_OUTPUT
          else
            echo "pass=0" >> $GITHUB_OUTPUT
            echo "total=0" >> $GITHUB_OUTPUT
            echo "score=0" >> $GITHUB_OUTPUT
          fi

      - name: Generate Golden Flow Report
        if: success() || failure()
        run: |
          PR_PASS=${{ steps.pr_tests.outputs.pass }}
          PR_TOTAL=${{ steps.pr_tests.outputs.total }}
          PR_SCORE=${{ steps.pr_tests.outputs.score }}
          MAIN_PASS=${{ steps.main_tests.outputs.pass }}
          MAIN_TOTAL=${{ steps.main_tests.outputs.total }}
          MAIN_SCORE=${{ steps.main_tests.outputs.score }}

          if [ "$PR_TOTAL" -eq 0 ]; then
            STATUS="âš ď¸Ź  SKIP (No golden flow tests yet)"
            VERDICT="Not applicable (Phase 7+ only)"
          elif (( $(echo "$PR_SCORE >= $MAIN_SCORE" | bc -l) )); then
            STATUS="âś… PASS"
            VERDICT="Golden flow pass rate maintained or improved"
          else
            STATUS="âťŚ FAIL"
            VERDICT="Golden flow pass rate regressed"
          fi

          cat > /tmp/golden_flow_report.md <<EOF
          # đź§Ş Golden Flow Tests

          | Branch | Passed | Total | Score |
          |--------|--------|-------|-------|
          | **PR** | $PR_PASS | $PR_TOTAL | **${PR_SCORE}%** |
          | main | $MAIN_PASS | $MAIN_TOTAL | ${MAIN_SCORE}% |

          **Status:** $STATUS

          **Verdict:** $VERDICT

          ---

          ## Golden Flows (from program.md Â§ 8)

          1. **Create Idea** â€” FAB â†’ enter spark â†’ DOT idea created
          2. **Refinement** â€” Chat â†’ question â†’ answer â†’ maturity transitions
          3. **Spec View** â€” Navigate to spec â†’ populated fields match conversation
          4. **Persistence** â€” Create â†’ close â†’ reopen â†’ data intact

          **Merge rule:** All hard gates pass AND golden_flow_pass_rate(PR) â‰Ą golden_flow_pass_rate(main)

          ---

          **Note:** Golden flow tests are implemented in Phase 7 (v0.8.0). Until then, this section will show 0/0.

          EOF

          echo "status=$STATUS" >> $GITHUB_OUTPUT

      - name: Update PR Comment with Golden Flows
        if: success() || failure()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: /tmp/golden_flow_report.md
          header: golden-flows

      - name: Golden Flow Gate Decision
        run: |
          if [ "${{ steps.pr_tests.outputs.total }}" -eq 0 ]; then
            echo "âš ď¸Ź  SKIP: No golden flow tests exist yet (expected in Phase 7)."
            exit 0
          fi

          PR_SCORE=${{ steps.pr_tests.outputs.score }}
          MAIN_SCORE=${{ steps.main_tests.outputs.score }}

          if (( $(echo "$PR_SCORE >= $MAIN_SCORE" | bc -l) )); then
            echo "âś… GOLDEN FLOWS PASSED: PR score ${PR_SCORE}% >= main score ${MAIN_SCORE}%"
          else
            echo "âťŚ GOLDEN FLOWS FAILED: PR score ${PR_SCORE}% < main score ${MAIN_SCORE}%"
            exit 1
          fi

  # NOTE: No auto-merge job for implementation PRs
  # Human review is REQUIRED per AGENT.md
